<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <title>Form</title>
</head>

<body>
    <header>
        <h1>The Register</h1>
    </header>
    <main>
        <form class="login">
            <h2>Login</h2>
            <div class="input-colums">
                <input type="text" name="CPF" placeholder="CPF" id="CPF">
            </div>
            <div class="input-colums">
                <input type="password" name="Password" placeholder="Password" id="send">
            </div>
            <input class="send" type="submit" value="Enter" id="Send">

            <h2 class="validation-login">Not Have account ? <a href="Index.html">Register</a></h2>
        </form>
        <script>
            $(document).ready(function () {
                $('#CPF').mask('000.000.000-00');
                $('#Telephone').mask('(00) 00000-0000');
                $('#CEP').mask('00.000-000');
            });
        </script>
    </main>
</body>

</html>
